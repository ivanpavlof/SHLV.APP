<style>
:root {
  /* Warm paper palette */
  --paper: #F4EFE6;
  --paper-2: #EDE6D8;
  --card: #FBF8F2;
  --ink: #0E0E10;
  --ink-2: #2B2B30;
  --ink-3: #55555C;
  --ink-4: #8A8A92;
  --rule: #D9D1BE;
  --tape: #E8DFCF;
  --brand: #2B6BEF;   /* logo cobalt */
  --brand-2: #1FB0F0; /* logo cyan */
  --accent: #E85A24;  /* warm safety-orange for emphasis */
  --ok: #1F8A55;
  --danger: #C63D2F;

  --font-display: 'Inter Tight', 'Söhne', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  --maxw: 1240px;
  --gutter: 28px;
}

[data-theme="dark"] {
  --paper: #0E1014;
  --paper-2: #14171D;
  --card: #1A1D25;
  --ink: #F5EEDF;
  --ink-2: #E5DECF;
  --ink-3: #A6A296;
  --ink-4: #6B6860;
  --rule: #2A2D35;
  --tape: #26272E;
}

[data-accent="teal"]  { --brand: #0E9488; --brand-2: #2DD4BF; }
[data-accent="indigo"] { --brand: #4F46E5; --brand-2: #818CF8; }
[data-accent="orange"] { --brand: #D2571B; --brand-2: #F59E0B; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
}


a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; }

.wrap {
  max-width: var(--maxw);
  margin: 0 auto;
  padding: 0 var(--gutter);
}

.mono { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.02em; text-transform: uppercase; color: var(--ink-3); }
.mono-sm { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-3); }
.display {
  font-family: var(--font-display);
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.02;
}

/* ======== NAV ======== */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: color-mix(in oklab, var(--paper) 88%, transparent);
  backdrop-filter: saturate(140%) blur(10px);
  -webkit-backdrop-filter: saturate(140%) blur(10px);
  border-bottom: 1px solid var(--rule);
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 64px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: 0.05em;
  font-size: 18px;
}
.brand-mark {
  width: 22px; height: 22px;
  position: relative;
}
.brand-mark::before, .brand-mark::after {
  content: ""; position: absolute; width: 16px; height: 7px;
}
.brand-mark::before { top: 3px; left: 0; background: var(--brand); }
.brand-mark::after  { bottom: 3px; right: 0; background: var(--brand-2); }


.nav-cta {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px;
  background: var(--ink);
  color: var(--paper);
  border-radius: 999px;
  font-size: 13px; font-weight: 500;
}

/* ======== HERO ======== */
.hero {
  position: relative;
  padding: 80px 0 108px;
  border-bottom: 1px solid var(--rule);
  overflow: hidden;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1fr;
  max-width: 820px;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 6px 10px;
  background: var(--tape);
  border: 1px solid var(--rule);
  border-radius: 2px;
  margin-bottom: 28px;
  transform: rotate(-0.6deg);
}
.hero-eyebrow .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--ok);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--ok) 22%, transparent);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 3px color-mix(in oklab, var(--ok) 22%, transparent); }
  50%     { box-shadow: 0 0 0 6px color-mix(in oklab, var(--ok) 8%, transparent); }
}

h1.headline {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(48px, 7.5vw, 104px);
  line-height: 0.98;
  letter-spacing: -0.035em;
  margin: 0 0 26px;
  text-wrap: balance;
}
h1.headline .quote { font-style: italic; color: var(--ink-3); font-weight: 400; }
h1.headline em { font-style: normal; background: linear-gradient(180deg, transparent 62%, color-mix(in oklab, var(--brand) 38%, transparent) 62%); padding: 0 2px; }

.hero-sub {
  font-size: 20px;
  color: var(--ink-2);
  max-width: 620px;
  margin: 0 0 38px;
  line-height: 1.5;
  text-wrap: pretty;
}
.hero-tagline {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 500;
  letter-spacing: -0.015em;
  color: var(--ink);
  max-width: 620px;
  margin: -10px 0 22px;
  line-height: 1.25;
}

.cta-row {
  display: flex; gap: 12px; flex-wrap: wrap;
  align-items: stretch;
}
.btn-store {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 12px 18px;
  background: var(--ink); color: var(--paper);
  border: 1px solid var(--ink);
  border-radius: 12px;
  transition: transform .15s;
  position: relative;
}
.btn-store:hover { transform: translateY(-1px); }
.btn-store .store-icon { width: 26px; height: 26px; flex: none; }
.btn-store .txt { display: flex; flex-direction: column; line-height: 1.1; text-align: left; }
.btn-store .txt small { font-size: 10px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.08em; }
.btn-store .txt strong { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }

.btn-store.disabled {
  background: transparent; color: var(--ink-3);
  border: 1px dashed var(--rule);
  cursor: not-allowed;
}
.btn-store.disabled:hover { transform: none; }
.btn-store .badge {
  position: absolute; top: -9px; right: -9px;
  background: var(--accent); color: white;
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.06em;
  padding: 3px 7px; border-radius: 2px;
  text-transform: uppercase;
}

.cta-note {
  margin-top: 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}


/* ======== SECTIONS ======== */
.section {
  padding: 96px 0;
  border-bottom: 1px solid var(--rule);
}
.section-head {
  display: block;
  margin-bottom: 56px;
}
.section-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(32px, 4vw, 56px);
  line-height: 1.04;
  letter-spacing: -0.025em;
  margin: 0;
  max-width: 820px;
  text-wrap: balance;
}




/* ======== FOOTER ======== */
.footer {
  padding: 60px 0 40px;
  background: var(--paper-2);
  border-top: 1px solid var(--rule);
}
.footer-simple {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 40px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.footer-brand { max-width: 460px; }
.footer-links {
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
  padding-top: 4px;
}
.footer-links a {
  font-size: 14px;
  color: var(--ink-2);
}
.footer-links a:hover {
  color: var(--ink);
  text-decoration: underline;
  text-underline-offset: 3px;
}
.footer h4 {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin: 0 0 16px;
  font-weight: 400;
}
.footer ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.footer a { color: var(--ink-2); font-size: 14px; }
.footer a:hover { color: var(--ink); text-decoration: underline; text-underline-offset: 3px; }
.footer-bottom {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 24px; border-top: 1px solid var(--rule);
  font-family: var(--font-mono); font-size: 11px; color: var(--ink-3);
  letter-spacing: 0.04em;
}

/* ======== DEEP-LINK BANNER (when /t/ is active) ======== */
.deeplink {
  background: var(--ink);
  color: var(--paper);
  padding: 18px 0;
  position: relative;
  overflow: hidden;
}
.deeplink::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(600px 200px at 80% 50%, color-mix(in oklab, var(--brand-2) 40%, transparent), transparent);
  pointer-events: none;
}
.deeplink-inner {
  display: flex; align-items: center; justify-content: space-between;
  gap: 24px; position: relative;
}
.deeplink .label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; opacity: 0.7; text-transform: uppercase; }
.deeplink .tagid { font-family: var(--font-mono); font-size: 14px; }
.deeplink button {
  background: var(--paper); color: var(--ink);
  padding: 10px 16px; border: none;
  border-radius: 999px;
  font-size: 13px; font-weight: 500;
}

/* ======== TWEAKS PANEL ======== */
.tweaks-panel {
  position: fixed;
  bottom: 20px; right: 20px;
  width: 280px;
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 16px;
  box-shadow: 0 20px 48px rgba(0,0,0,.15);
  z-index: 1000;
  font-family: var(--font-body);
}
.tweaks-panel h3 {
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-3); margin: 0 0 14px;
}
.tweak-row { margin-bottom: 14px; }
.tweak-row label {
  display: block; font-size: 11px;
  font-family: var(--font-mono); letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink-3);
  margin-bottom: 6px;
}
.tweak-options { display: flex; gap: 6px; flex-wrap: wrap; }
.tweak-opt {
  padding: 6px 10px;
  border: 1px solid var(--rule);
  background: transparent;
  border-radius: 4px;
  font-size: 12px;
  color: var(--ink-2);
  transition: all .12s;
}
.tweak-opt:hover { border-color: var(--ink-3); }
.tweak-opt[aria-pressed="true"] {
  background: var(--ink); color: var(--paper);
  border-color: var(--ink);
}
.tweak-swatch {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--rule);
  cursor: pointer; padding: 0;
}
.tweak-swatch[aria-pressed="true"] { border-color: var(--ink); transform: scale(1.1); }


/* Responsiveness */
@media (max-width: 560px) {
  :root { --gutter: 20px; }
}

</style>
</head>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/icons.jsx"></script>
